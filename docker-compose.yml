services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reels-pro-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/reels-pro
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reels-network

  mongodb:
    image: mongo:latest
    container_name: reels-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - reels-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: reels-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - reels-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  reels-network:
    driver: bridge

volumes:
  mongodb_data:
